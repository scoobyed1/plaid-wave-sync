name: Plaid → Wave Sync

on:
  schedule:
    # Daily at 9am ET (1pm UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to sync'
        default: '3'
      dry_run:
        description: 'Dry run (true/false)'
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Run sync
        env:
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          WAVE_ACCESS_TOKEN: ${{ secrets.WAVE_ACCESS_TOKEN }}
          WAVE_BUSINESS_ID: ${{ secrets.WAVE_BUSINESS_ID }}
          PLAID_ACCESS_TOKENS: ${{ secrets.PLAID_ACCESS_TOKENS }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="uv run plaid_sync.py --days $DAYS"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          $CMD
