name: Plaid → Wave Sync

on:
  schedule:
    # Daily at 9am ET (1pm UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to sync'
        default: '3'
      dry_run:
        description: 'Dry run (true/false)'
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets configured
        env:
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_ACCESS_TOKENS: ${{ secrets.PLAID_ACCESS_TOKENS }}
        run: |
          if [ -z "$PLAID_CLIENT_ID" ] || [ -z "$PLAID_ACCESS_TOKENS" ]; then
            echo "::error::Setup incomplete. Open this repo in a Codespace and run ./setup.sh to configure your accounts."
            echo ""
            echo "Missing:"
            [ -z "$PLAID_CLIENT_ID" ] && echo "  - PLAID_CLIENT_ID"
            [ -z "$PLAID_ACCESS_TOKENS" ] && echo "  - PLAID_ACCESS_TOKENS"
            echo ""
            echo "Fix: https://github.com/${{ github.repository }}#setup-5-minutes"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Run sync
        env:
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          WAVE_ACCESS_TOKEN: ${{ secrets.WAVE_ACCESS_TOKEN }}
          WAVE_BUSINESS_ID: ${{ secrets.WAVE_BUSINESS_ID }}
          PLAID_ACCESS_TOKENS: ${{ secrets.PLAID_ACCESS_TOKENS }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="uv run plaid_sync.py --days $DAYS"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          $CMD || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" = "2" ]; then
            echo "::error::Bank token expired. Open a Codespace and run: uv run plaid_sync.py --reauth"
          fi
          exit ${EXIT_CODE:-0}
